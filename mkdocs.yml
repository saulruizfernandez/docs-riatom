site_name: RIA TOM Toolkit
site_url: https://saulruizfernandez.github.io/docs-riatom/
use_directory_urls: false
site_description: Astronomical Observation Planning Tool for the Red de Infraestructuras de Astronomía de España
site_author: IAC - Instituto de Astrofísica de Canarias
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [scheduler]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Overview: getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Architecture:
    - System Overview: architecture/index.md
    - Components: architecture/components.md
    - Data Flow: architecture/data-flow.md
    - Database Schema: architecture/database.md
  - User Guide:
    - Introduction: user-guide/index.md
    - Managing Targets: user-guide/targets.md
    - Configuring Telescopes: user-guide/telescopes.md
    - Defining Constraints: user-guide/constraints.md
    - Observation Planning: user-guide/planning.md
    - Viewing Schedules: user-guide/schedules.md
  - Scheduler Module:
    - Overview: scheduler/index.md
    - Constraints Checking: scheduler/constraints.md
    - Scoring Strategies: scheduler/scoring.md
    - Allocation Strategies: scheduler/allocation.md
    - Astronomy Utilities: scheduler/astronomy.md
    - Weather Module: scheduler/weather.md
    - ASCOM Controller: scheduler/ascom.md
  - TOM Integration:
    - Overview: tom-integration/index.md
    - Custom TOM Setup: tom-integration/setup.md
    - Facilities: tom-integration/facilities.md
    - Cadences: tom-integration/cadences.md
    - Extending Targets: tom-integration/targets.md
  - API Reference:
    - Models: api/models.md
    - Views: api/views.md
    - Forms: api/forms.md
    - URLs: api/urls.md
